<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포스트 — My Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/post.css">
  <link rel="stylesheet" href="css/highlight-light.css" class="hljs-theme-light">
  <link rel="stylesheet" href="css/highlight-dark.css"  class="hljs-theme-dark">
  <script src="js/theme.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-title">
        <span class="prompt">&gt;_</span> MY-BLOG<span class="cursor"></span>
      </a>
      <button id="theme-toggle" aria-label="밝기 전환">
        <span class="toggle-dot"></span>
        <span id="toggle-label">DIM</span>
      </button>
    </div>
  </header>

  <!-- 본문(left) + TOC(right) -->
  <div class="post-layout">
    <main class="post-main">
      <!-- 모바일 TOC -->
      <details class="toc-mobile" id="toc-mobile">
        <summary>// 목차</summary>
        <nav id="toc-nav-mobile"></nav>
      </details>

      <article id="post-article" aria-live="polite">
        <p class="loading-msg">// 포스트를 불러오는 중...</p>
      </article>

      <nav class="post-nav" aria-label="목록으로">
        <a href="index.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          cd ../
        </a>
      </nav>
    </main>

    <!-- 데스크탑 TOC (오른쪽) -->
    <aside class="toc-aside" id="toc-aside" aria-label="목차">
      <div class="toc-inner">
        <p class="toc-heading">// 목차</p>
        <nav id="toc-nav"></nav>
      </div>
    </aside>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>// &copy; 2026 MY-BLOG — Pure HTML &middot; CSS &middot; JS</p>
    </div>
  </footer>

  <script src="js/vendor/marked.min.js"></script>
  <script src="js/vendor/highlight.min.js"></script>
  <script src="js/post.js"></script>
</body>
</html>
