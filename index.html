<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">
  <!-- 다크 모드 깜빡임 방지: DOM 파싱 전 즉시 실행 -->
  <script src="js/theme.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-title">My Blog</a>
      <div class="header-actions">
        <button id="theme-toggle" aria-label="다크 모드 전환" title="테마 전환">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="hero">
        <h1 class="hero-title">글 목록</h1>
        <p class="hero-desc">개발과 생각을 기록하는 공간입니다.</p>
      </section>

      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search" type="search" class="search-input"
                 placeholder="제목, 내용, 태그 검색..." autocomplete="off">
        </div>
      </div>

      <div id="tag-filter" class="tag-filter" role="group" aria-label="태그 필터"></div>

      <div id="post-list" class="archive" aria-live="polite">
        <p class="loading-msg">포스트를 불러오는 중...</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 My Blog. Pure HTML, CSS &amp; JS.</p>
    </div>
  </footer>

  <script src="js/home.js"></script>
</body>
</html>
