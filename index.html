<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">
  <script src="js/theme.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-title">
        <span class="prompt">&gt;_</span> MY-BLOG<span class="cursor"></span>
      </a>
      <button id="theme-toggle" aria-label="밝기 전환">
        <span class="toggle-dot"></span>
        <span id="toggle-label">DIM</span>
      </button>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">글 목록<span class="cursor"></span></h1>
        <p class="page-desc">개발과 생각을 기록하는 공간입니다.</p>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <input id="search" type="search" class="search-input"
                 placeholder="검색..." autocomplete="off">
        </div>
      </div>

      <div id="tag-filter" class="tag-filter" role="group" aria-label="태그 필터"></div>

      <div id="post-list" class="archive" aria-live="polite">
        <p class="loading-msg">// 포스트를 불러오는 중...</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>// &copy; 2026 MY-BLOG — Pure HTML &middot; CSS &middot; JS</p>
    </div>
  </footer>

  <script src="js/home.js"></script>
</body>
</html>
